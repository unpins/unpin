<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="terminal" baseProfile="full" viewBox="0 0 687 353" width="687" version="1.1">
    <defs>
        <termtosvg:template_settings xmlns:termtosvg="https://github.com/nbedos/termtosvg">
            <termtosvg:screen_geometry columns="80" rows="16"/>
            <termtosvg:animation type="css"/>
        </termtosvg:template_settings>
        <style type="text/css" id="generated-style"></style>
        <style type="text/css" id="user-style">
            /* unpins — GitHub light palette */
            /* Embedded Cascadia Mono (subset) so the demo renders identically in any
               viewer, independent of installed fonts. 13.653px makes its
               0.5859em advance exactly the 8px cell termtosvg pins each glyph
               to, so lengthAdjust redistributes nothing and the text stays put. */
            @font-face { font-family: 'Cascadia Mono'; font-style: normal; font-weight: 400;
                         src: url(data:font/woff2;base64,) format('woff2'); }
            #screen { font-family: 'Cascadia Mono', monospace; font-size: 13.653px }
            .foreground {fill: #1f2328}
            .background {fill: #ffffff}
            .color0 {fill: #24292f}
            .color1 {fill: #cf222e}
            .color2 {fill: #1a7f37}
            .color3 {fill: #9a6700}
            .color4 {fill: #0969da}
            .color5 {fill: #8250df}
            .color6 {fill: #1b7c83}
            .color7 {fill: #6e7781}
            .color8 {fill: #57606a}
            .color9 {fill: #a40e26}
            .color10 {fill: #1a7f37}
            .color11 {fill: #633c01}
            .color12 {fill: #218bff}
            .color13 {fill: #a475f9}
            .color14 {fill: #3192aa}
            .color15 {fill: #8c959f}
        </style>
    </defs>
    <rect id="terminalui" class="background" width="100%" height="100%" ry="4.5826941" stroke="#d0d7de" stroke-width="1"/>
    <circle cx="24" cy="23" r="7" fill="#ff5f56"/>
    <circle cx="44" cy="23" r="7" fill="#ffbd2e"/>
    <circle cx="64" cy="23" r="7" fill="#27c93f"/>
    <svg id="screen" width="640" height="272" x="23" y="50" viewBox="0 0 640 272" preserveAspectRatio="xMidYMin slice"></svg>
</svg>
